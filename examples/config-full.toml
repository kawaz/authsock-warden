# authsock-warden full configuration example
#
# Place at: ~/.config/authsock-warden/config.toml

# --- Policy settings ---
[policy]
idle_check_interval = "30s"
idle_check_command = "/path/to/cmux-check.sh"

# --- Authentication settings ---
[auth]
method = "command"
command = "/path/to/notify-and-verify.sh"

# --- Key sources ---

# Proxy mode: forward signing requests to 1Password SSH agent
[[sources]]
type = "agent"
name = "1password-proxy"
socket = "~/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock"

# 1Password managed: warden fetches keys via op CLI and signs locally
# [[sources]]
# type = "op"
# name = "1password-managed"

# File-based keys
# [[sources]]
# type = "file"
# name = "local-keys"
# paths = ["~/.ssh/id_work", "~/.ssh/id_personal"]

# --- Socket definitions ---

# Work socket: only ed25519 keys with @work in comment
[sockets.work]
path = "$XDG_RUNTIME_DIR/authsock-warden/work.sock"
sources = ["1password-proxy"]
filters = ["comment=~@work", "type=ed25519"]
timeout = "1h"
allowed_processes = ["git", "ssh", "jj"]

# Personal socket: all keys from 1Password
[sockets.personal]
path = "$XDG_RUNTIME_DIR/authsock-warden/personal.sock"
sources = ["1password-proxy"]
filters = ["comment=~personal"]

# All keys socket: no filtering
[sockets.all]
path = "/tmp/authsock-warden.sock"
sources = ["1password-proxy"]

# --- Per-key policies ---

# Override timeout and access control for a specific key
# [[keys]]
# public_key = "ssh-ed25519 AAAA... GitHub"
# timeout = "4h"
# on_timeout = "lock"
# forget_after = "24h"
# allowed_processes = ["ssh", "git", "jj"]

# --- GitHub API settings ---
[github]
cache_ttl = "1h"
timeout = "10s"
