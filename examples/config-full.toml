# authsock-warden full configuration example
#
# Place at: ~/.config/authsock-warden/config.toml

# --- Policy settings ---
[policy]
idle_check_interval = "30s"
idle_check_command = "/path/to/cmux-check.sh"

# --- Authentication settings ---
[auth]
method = "command"
command = "/path/to/notify-and-verify.sh"

# --- Source groups ---

# A source group bundles multiple key sources under one name.
# Members use URI-like notation:
#   op://              → all 1Password SSH keys (warden signs locally)
#   op://vault         → SSH keys in a specific vault
#   op://vault/item    → a specific SSH key
#   agent:PATH         → proxy to an SSH agent socket (upstream signs)
#   file:PATH          → load private key from file (warden signs locally)
#   /path/to/something → auto-detect: socket → agent, file → key

# Work source: 1Password managed keys + agent proxy
[[sources]]
name = "work"
members = [
    "op://emerada",
    "agent:~/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock",
]

# Personal source: local key file
# [[sources]]
# name = "personal"
# members = ["~/.ssh/id_personal"]

# --- Socket definitions ---

# Work socket: only ed25519 keys with @work in comment
[sockets.work]
path = "$XDG_RUNTIME_DIR/authsock-warden/work.sock"
source = "work"
filters = ["comment=~@work", "type=ed25519"]
timeout = "1h"
allowed_processes = ["git", "ssh", "jj"]

# All keys socket: no filtering
[sockets.all]
path = "/tmp/authsock-warden.sock"
source = "work"

# --- Per-key policies ---

# Override timeout and access control for a specific key
# [[keys]]
# public_key = "ssh-ed25519 AAAA... GitHub"
# timeout = "4h"
# on_timeout = "lock"        # "lock" keeps key in memory, "forget" zeroizes it
# forget_after = "24h"       # absolute limit, even if locked
# allowed_processes = ["ssh", "git", "jj"]

# --- GitHub API settings ---
[github]
cache_ttl = "1h"
timeout = "10s"
